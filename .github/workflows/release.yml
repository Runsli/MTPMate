name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish macOS release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install dependencies
        run: |
          set -euo pipefail

          brew update
          brew list libmtp >/dev/null 2>&1 || brew install libmtp
          brew list libusb >/dev/null 2>&1 || brew install libusb

          LIBMTP_PREFIX="$(brew --prefix libmtp)"
          LIBUSB_PREFIX="$(brew --prefix libusb)"

          test -f "${LIBMTP_PREFIX}/include/libmtp.h"
          test -d "${LIBUSB_PREFIX}/include/libusb-1.0"

          echo "LIBMTP_PREFIX=${LIBMTP_PREFIX}" >> "$GITHUB_ENV"
          echo "LIBUSB_PREFIX=${LIBUSB_PREFIX}" >> "$GITHUB_ENV"

          echo "libmtp prefix: ${LIBMTP_PREFIX}"
          echo "libusb prefix: ${LIBUSB_PREFIX}"

      - name: Build MTPMate
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          BUILD_ARCH="$(uname -m)"
          set +e
          xcodebuild \
            -project mtp.xcodeproj \
            -scheme mtp \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination "generic/platform=macOS" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            ARCHS="$BUILD_ARCH" \
            ONLY_ACTIVE_ARCH=YES \
            ENABLE_PREVIEWS=NO \
            HEADER_SEARCH_PATHS="${LIBMTP_PREFIX}/include ${LIBUSB_PREFIX}/include/libusb-1.0" \
            LIBRARY_SEARCH_PATHS="${LIBMTP_PREFIX}/lib ${LIBUSB_PREFIX}/lib" \
            OTHER_CFLAGS="-I${LIBMTP_PREFIX}/include -I${LIBUSB_PREFIX}/include/libusb-1.0" \
            OTHER_LDFLAGS="-L${LIBMTP_PREFIX}/lib -L${LIBUSB_PREFIX}/lib -lmtp -lusb-1.0 -Wl,-w" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee xcodebuild.log
          XCODEBUILD_STATUS="${PIPESTATUS[0]}"
          set -e

          if [ "$XCODEBUILD_STATUS" -ne 0 ]; then
            echo "::group::xcodebuild errors"
            grep -nEi "error:|fatal error:|undefined symbols|ld:|clang: error|BUILD FAILED|The following build commands failed" xcodebuild.log || true
            echo "::endgroup::"
            exit "$XCODEBUILD_STATUS"
          fi

      - name: Package app
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          BUILD_ARCH="$(uname -m)"
          APP_PATH="DerivedData/Build/Products/Release/MTPMate.app"
          ZIP_NAME="MTPMate-${VERSION}-macOS-${BUILD_ARCH}.zip"

          test -d "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_ARCH=$BUILD_ARCH" >> "$GITHUB_ENV"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${ZIP_NAME}"

          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            --jq ".body" > generated-notes.md

          {
            echo "## 下载"
            echo
            echo "- [MTPMate ${VERSION} for macOS ${BUILD_ARCH}](${DOWNLOAD_URL})"
            echo
            echo "## 更新日志"
            echo
            cat generated-notes.md
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" "${ZIP_NAME}" \
            --title "MTPMate ${VERSION}" \
            --notes-file release-notes.md
